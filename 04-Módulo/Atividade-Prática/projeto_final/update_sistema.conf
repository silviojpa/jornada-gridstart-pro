# ============================================================
# update_sistema.conf - arquivo de configuracao (S04T02V08)
# GridStart Pro - Second Gear
#
# Este arquivo e carregado pelo update_sistema.sh com "source".
# Cada linha define uma variavel no formato CHAVE=valor.
# Nao coloque espacos antes/depois do "=".
# Strings com espaco devem ir entre aspas duplas.
# ============================================================

# Arquivo onde o script grava o historico de execucao
LOG_FILE="./update_sistema.log"

# Se "true", roda apt-get upgrade -y de fato.
# Se "false", roda apenas apt-get update e simula o upgrade
# (modo "dry run" - util para testar sem alterar o sistema).
MODO_EXECUCAO="false"

# Numero maximo de pacotes que podem ser atualizados sem alerta.
# Acima disso, o script registra um WARNING no log
# (sinal de que o sistema ficou muito tempo sem atualizar).
LIMITE_PACOTES_ALERTA=20
